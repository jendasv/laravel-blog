name: Laravel CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  tests:

    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: project_testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: project_testing
      DB_USERNAME: root
      DB_PASSWORD: root

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: mbstring, pdo, mysql
          coverage: none

      - name: Copy env
        run: cp src/.env.example src/.env

      - name: Install Composer dependencies
        run: |
          cd src
          composer install --prefer-dist --no-progress

      - name: Generate key
        run: |
          cd src
          php artisan key:generate

      - name: Wait for MySQL
        run: sleep 10

      - name: Run migrations
        run: |
          cd src
          php artisan migrate --env=testing

      - name: Run tests
        run: |
          cd src
          php artisan test