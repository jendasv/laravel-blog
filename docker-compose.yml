services:

  app:
    build:
      context: ./docker/php
      args:
        UID: 1000
        GID: 1000
    container_name: blog_app
    working_dir: /var/www
    volumes:
      - ./src:/var/www
#      - ./vendor:/var/www/vendor
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    image: node:20
    working_dir: /var/www
    volumes:
      - ./src:/var/www
      - ./src/node_modules:/var/www/node_modules
    command: npm run dev
    ports:
      - "5173:5173"

  nginx:
    image: nginx:latest
    container_name: blog_nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mariadb:10.6
    container_name: blog_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: blog
      MYSQL_USER: blog
      MYSQL_PASSWORD: blog
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  adminer:
    image: adminer
    container_name: blog_adminer
    ports:
      - "8081:8080"

volumes:
  db_data: